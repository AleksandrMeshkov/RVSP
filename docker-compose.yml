version: "3.9"

services:
  api:
    build: .
    container_name: wedding-rsvp-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
